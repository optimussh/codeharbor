services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vibe-pgvector
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: vibe
      POSTGRES_PASSWORD: vibe
      POSTGRES_DB: vibe
    volumes:
      - vibe_pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibe -d vibe"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vibe_pgdata:
